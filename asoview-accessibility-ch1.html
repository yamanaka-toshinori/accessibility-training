            3: [
                { tag: '環境の整備と配慮', q: '合理的配慮と、あらかじめバリアを減らす「環境の整備」の違いとして、正しい説明はどれですか？', opts: ['合理的配慮だけを行えばよく環境の整備は完全に廃止してよい仕様', '事前にバリアを減らすのが整備で個別の対話対応が合理的配慮の仕様', 'すべてのシステムを完璧にしなければ即座に営業停止処分になる仕様', '配慮はウィジェットを入れるだけで個別の対話なしで提供される仕様'], ans: 1, note: '事前の環境整備があるほど、個別対話CS対応コストを削減できるからです。' },
                { tag: '建設的対話の義務', q: '合理的配慮を求めるゲストから「画面操作が完了できないため、代行予約を手伝ってほしい」と申し出があった際、避けるべき不適切な対応はどれですか？', opts: ['社内の利用セキュリティルールを最優先して一律でお手伝いをお断りする対応', 'メールや問い合わせフォーム等を用いた代行手続きなど代替の手段を提案する対応', '個別の対話によるアシストを行い、発生したバリアの事実を開発チームに共有する', 'ゲストの安全やプライバシーに最大限 of 配慮を払いながら代理で手続きを行う対応'], ans: 0, note: '一方的なルールの押しつけや拒絶は法律で禁止されています。' }
            ]
        };

        function triggerPreviewSimulator(fileName) {
            let chNum = 1;
            if (fileName.includes("ch2")) chNum = 2;
            if (fileName.includes("ch3")) chNum = 3;
            
            currentChapter = chNum;
            activeQuizList = simQuizDatabase[chNum] || simQuizDatabase[1];

            document.getElementById("chapter-select").classList.add("hidden");
            document.getElementById("learning-phase").classList.remove("hidden");
            document.getElementById("nav-home-btn").classList.remove("hidden");
            
            document.getElementById("learning-content").innerHTML = simChapterContents["ch" + chNum] || simChapterContents["ch1"];
            
            const headerTitle = document.getElementById("header-title");
            if (headerTitle) {
                headerTitle.innerText = `Chapter 0${chNum} (Preview Debug Mode)`;
            }
            
            window.scrollTo({ top: 0, behavior: "smooth" });
        }

        function startQuizSim() {
            document.getElementById("learning-phase").classList.add("hidden");
            document.getElementById("quiz-phase").classList.remove("hidden");
            currentIdx = 0;
            score = 0;
            loadQuestionSim();
        }

        function loadQuestionSim() {
            isAnswered = false;
            const qBox = activeQuizList[currentIdx];
            const total = activeQuizList.length;

            document.getElementById("question-index").innerText = `第 ${currentIdx + 1} 問 / ${total} 問中 (デバッグ用)`;
            document.getElementById("current-score-text").innerText = `正答数: ${score}`;
            document.getElementById("progress-bar").style.width = `${((currentIdx + 1) / total) * 100}%`;
            document.getElementById("question-tag").innerText = qBox.tag;
            document.getElementById("question-text").innerText = qBox.q;

            currentShuffledOpts = qBox.opts.map((opt, i) => ({ text: opt, isCorrect: i === qBox.ans }));
            for (let i = currentShuffledOpts.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [currentShuffledOpts[i], currentShuffledOpts[j]] = [currentShuffledOpts[j], currentShuffledOpts[i]];
            }

            const container = document.getElementById("options-container"); 
            container.innerHTML = "";
            currentShuffledOpts.forEach((opt, idx) => {
                const btn = document.createElement("button");
                btn.className = "option-item text-left w-full p-3 sm:p-4 rounded-lg border border-border bg-white text-xs sm:text-sm font-medium hover:bg-secondary transition-all cursor-pointer focus:outline-none";
                btn.innerText = opt.text;
                btn.onclick = () => selectOptionSim(idx);
                container.appendChild(btn);
            });
            document.getElementById("feedback-box").classList.add("hidden");
            document.getElementById("next-btn").classList.add("hidden");
        }

        function selectOptionSim(idx) {
            if (isAnswered) return;
            isAnswered = true;
            const btns = document.getElementsByClassName("option-item");
            const qBox = activeQuizList[currentIdx];

            for (let i = 0; i < btns.length; i++) {
                btns[i].disabled = true;
                if (currentShuffledOpts[i].isCorrect) {
                    btns[i].className += " bg-emerald-50/50 border-emerald-500 text-emerald-900 font-semibold";
                }
            }

            const correct = currentShuffledOpts[idx].isCorrect;
            if (correct) score++;
            else btns[idx].className += " bg-rose-50/50 border-rose-400 text-rose-900";

            const feedback = document.getElementById("feedback-box");
            feedback.className = `mt-4 p-3 sm:p-4 rounded-lg border ${correct ? 'bg-emerald-50/50 border-emerald-500 text-emerald-900' : 'bg-rose-50/50 border-rose-400 text-rose-900'} fade-in text-left`;
            document.getElementById("feedback-title").innerText = correct ? "正解です" : "不正解です";
            
            const iconSvg = document.getElementById("feedback-icon");
            iconSvg.innerHTML = correct ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>' : '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"/>';
            iconSvg.className = `w-4 h-4 sm:w-5 h-5 ${correct ? 'text-emerald-600' : 'text-rose-600'}`;

            document.getElementById("feedback-rationale").innerHTML = qBox.note;
            feedback.classList.remove("hidden");
            document.getElementById("next-btn").classList.remove("hidden");
        }

        function nextQuestionSim() {
            if (++currentIdx < activeQuizList.length) {
                loadQuestionSim();
            } else {
                showResultSim();
            }
        }

        function showResultSim() {
            document.getElementById("quiz-phase").classList.add("hidden");
            document.getElementById("result-phase").classList.remove("hidden");
            document.getElementById("final-score").innerText = `${score} / ${activeQuizList.length}`;
            
            const rankSpan = document.getElementById("score-rank");
            const msgP = document.getElementById("result-message");

            rankSpan.innerText = "ランク：体験設計推進メンバー 🌱";
            msgP.innerText = "※プレビューデバッグモードにおける簡易テスト完了。実際の30問完全版は、アップロード後の各チャプター個別ファイルで起動します。";
            window.scrollTo({ top: 0, behavior: "smooth" });
        }

        function restartQuizSimOnly() {
            document.getElementById("result-phase").classList.add("hidden");
            startQuizSim();
        }

        function backToHubHome() {
            document.getElementById("chapter-select").classList.remove("hidden");
            ["learning-phase", "quiz-phase", "result-phase"].forEach(id => document.getElementById(id).classList.add("hidden"));
            document.getElementById("nav-home-btn").classList.add("hidden");
            
            const headerTitle = document.getElementById("header-title");
            if (headerTitle) {
                headerTitle.innerText = "アクセシビリティ研修プログラム";
            }
            
            window.scrollTo({ top: 0, behavior: "smooth" });
        }

        // --- 🧪 ---

        function renderChapterGrid() {
            const grid = document.getElementById("chapter-grid"); 
            grid.innerHTML = "";
            chaptersData.forEach(c => {
                const card = document.createElement("div");
                card.className = "border border-border rounded-xl p-6 bg-white hover:shadow-md hover:border-indigo-300 transition-all flex flex-col justify-between group shadow-sm shadow-indigo-500/5";
                card.innerHTML = `
                    <div>
                        <div class="flex items-center justify-between mb-4">
                            <span class="bg-secondary text-secondary-foreground text-[10px] sm:text-xs font-bold px-2.5 py-1 rounded-md tracking-wider">${c.numLabel}</span>
                            <span class="text-[10px] sm:text-xs text-muted-foreground font-medium">${c.badge}</span>
                        </div>
                        <h3 class="text-base sm:text-lg font-bold text-foreground mb-2 group-hover:text-indigo-600 transition-colors">${c.title}</h3>
                        <p class="text-muted-foreground text-xs leading-relaxed mb-6">${c.description}</p>
                    </div>
                    <button onclick="navigateToChapter(${c.id}, '${c.file}')" class="w-full bg-primary hover:bg-primary/95 text-primary-foreground font-semibold py-2.5 rounded-md transition-colors text-xs sm:text-sm text-center block cursor-pointer">
                        講義をはじめる
                    </button>
                `;
                grid.appendChild(card);
            });
        }

        function renderResources() {
            const section = document.getElementById("resource-section");
            section.innerHTML = `
                <div class="mb-6">
                    <h3 class="text-base sm:text-lg font-bold text-foreground tracking-tight">📚 推薦学習リソース</h3>
                    <p class="text-xs text-muted-foreground mt-1">アクセシビリティをさらに深く学ぶための、全メンバー必読の解説リンク集です。</p>
                </div>
            `;
            const container = document.createElement("div"); 
            container.className = "space-y-6";
            
            resources.forEach(r => {
                const div = document.createElement("div");
                div.innerHTML = `
                    <h4 class="text-xs font-bold uppercase tracking-wider text-muted-foreground mb-3 flex items-center space-x-2">
                        <span class="w-1.5 h-1.5 rounded-full bg-indigo-500"></span>
                        <span>${r.cat}</span>
                    </h4>
                    <div class="grid gap-3 grid-cols-1 sm:grid-cols-2">
                        ${r.items.map(item => `
                            <a href="${item.url}" target="_blank" rel="noopener" class="block p-4 rounded-lg border border-border bg-white hover:bg-secondary/40 transition-all group">
                                <span class="text-xs font-bold block mb-1 underline text-foreground group-hover:text-indigo-600 transition-colors">${item.title}</span>
                                <span class="text-[10px] sm:text-[11px] text-muted-foreground leading-relaxed block">${item.reason}</span>
                            </a>
                        `).join('')}
                    </div>
                `;
                container.appendChild(div);
            });
            section.appendChild(container);
        }

        renderChapterGrid();
        renderResources();
    </script>
</body>
</html>
